<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient: deep space -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1f2540"/>
      <stop offset="55%" stop-color="#13162a"/>
      <stop offset="100%" stop-color="#070912"/>
    </radialGradient>

    <!-- Headband (crimson silk) -->
    <linearGradient id="headband" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e63a4d"/>
      <stop offset="40%" stop-color="#b8202f"/>
      <stop offset="100%" stop-color="#5e0d15"/>
    </linearGradient>

    <!-- Headband knot tail -->
    <linearGradient id="knot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63a4d"/>
      <stop offset="100%" stop-color="#7a1019"/>
    </linearGradient>

    <!-- Mask cloth (charcoal with subtle blue) -->
    <linearGradient id="cloth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2f48"/>
      <stop offset="55%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0c0e18"/>
    </linearGradient>

    <!-- Cloth highlight -->
    <linearGradient id="clothHi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4060" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a1d2e" stop-opacity="0"/>
    </linearGradient>

    <!-- Eye glow (cyan) -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aaffee"/>
      <stop offset="35%" stop-color="#00ffe1"/>
      <stop offset="70%" stop-color="#00a890"/>
      <stop offset="100%" stop-color="#003a35" stop-opacity="0"/>
    </radialGradient>

    <!-- Eye socket darkness -->
    <linearGradient id="socket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0d18"/>
    </linearGradient>

    <!-- Steel (katanas) -->
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8dde8"/>
      <stop offset="50%" stop-color="#8c93a8"/>
      <stop offset="100%" stop-color="#3a4060"/>
    </linearGradient>

    <!-- Gold (headband symbol) -->
    <radialGradient id="gold" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="60%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#7a5a00"/>
    </radialGradient>

    <!-- Glow filter for eyes -->
    <filter id="eyeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Steel sheen -->
    <filter id="sheen">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Subtle grid (binary aesthetic) -->
  <g opacity="0.05" stroke="#00ffe1" stroke-width="0.5" fill="none">
    <path d="M 32 0 V 256 M 64 0 V 256 M 96 0 V 256 M 128 0 V 256 M 160 0 V 256 M 192 0 V 256 M 224 0 V 256"/>
    <path d="M 0 32 H 256 M 0 64 H 256 M 0 96 H 256 M 0 128 H 256 M 0 160 H 256 M 0 192 H 256 M 0 224 H 256"/>
  </g>

  <!-- Outer frame: thin neon -->
  <rect x="6" y="6" width="244" height="244" rx="46" ry="46" fill="none" stroke="#00ffe1" stroke-width="1.5" opacity="0.65"/>
  <!-- Inner accent corners -->
  <g stroke="#00ffe1" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round">
    <path d="M 22 44 L 22 22 L 44 22"/>
    <path d="M 212 22 L 234 22 L 234 44"/>
    <path d="M 22 212 L 22 234 L 44 234"/>
    <path d="M 212 234 L 234 234 L 234 212"/>
  </g>

  <!-- Crossed katanas (behind head) -->
  <g opacity="0.55" filter="url(#sheen)">
    <!-- Blade 1: top-left to bottom-right -->
    <line x1="44" y1="216" x2="216" y2="44" stroke="url(#steel)" stroke-width="3" stroke-linecap="round"/>
    <!-- Edge highlight -->
    <line x1="46" y1="214" x2="214" y2="46" stroke="#ffffff" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Guard 1 -->
    <rect x="92" y="156" width="14" height="3.5" transform="rotate(-45 99 158)" fill="#5a6080"/>
    <!-- Handle 1 -->
    <rect x="58" y="194" width="34" height="6" rx="1.5" transform="rotate(-45 75 197)" fill="#3a4060"/>
    <!-- Pommel 1 -->
    <circle cx="50" cy="210" r="3.5" fill="#5a6080"/>

    <!-- Blade 2: top-right to bottom-left -->
    <line x1="212" y1="216" x2="40" y2="44" stroke="url(#steel)" stroke-width="3" stroke-linecap="round"/>
    <line x1="210" y1="214" x2="42" y2="46" stroke="#ffffff" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
    <rect x="150" y="156" width="14" height="3.5" transform="rotate(45 157 158)" fill="#5a6080"/>
    <rect x="164" y="194" width="34" height="6" rx="1.5" transform="rotate(45 181 197)" fill="#3a4060"/>
    <circle cx="206" cy="210" r="3.5" fill="#5a6080"/>

    <!-- Crossed tsuba emblem (center) -->
    <circle cx="128" cy="130" r="7" fill="#1a1d2e" stroke="#00ffe1" stroke-width="1.5" opacity="0.85"/>
    <circle cx="128" cy="130" r="2.5" fill="#00ffe1" opacity="0.7"/>
  </g>

  <!-- ===== NINJA HEAD ===== -->
  <g filter="url(#softShadow)">
    <!-- Head base (slightly oval) -->
    <ellipse cx="128" cy="118" rx="74" ry="82" fill="url(#cloth)"/>

    <!-- Head crown shadow -->
    <ellipse cx="128" cy="78" rx="68" ry="14" fill="#0a0d18" opacity="0.55"/>

    <!-- Headband (silk wrap) -->
    <path d="M 52 96
             Q 70 88 128 84
             Q 186 88 204 96
             L 204 122
             Q 186 116 128 112
             Q 70 116 52 122 Z"
          fill="url(#headband)"/>

    <!-- Headband fabric folds (highlights) -->
    <path d="M 52 96 Q 70 88 128 84 Q 186 88 204 96" stroke="#ff6478" stroke-width="0.6" fill="none" opacity="0.55"/>
    <path d="M 52 122 Q 70 116 128 112 Q 186 116 204 122" stroke="#5a0e16" stroke-width="0.8" fill="none" opacity="0.7"/>
    <!-- Subtle vertical fold lines -->
    <g stroke="#5a0e16" stroke-width="0.4" opacity="0.4">
      <line x1="78" y1="90" x2="78" y2="118"/>
      <line x1="108" y1="86" x2="108" y2="114"/>
      <line x1="148" y1="86" x2="148" y2="114"/>
      <line x1="178" y1="90" x2="178" y2="118"/>
    </g>

    <!-- Headband knot (right side) -->
    <path d="M 204 100
             L 226 90
             L 220 110
             L 234 114
             L 214 118
             L 218 106 Z"
          fill="url(#knot)" stroke="#3a0810" stroke-width="0.4"/>

    <!-- Headband knot tails (flowing) -->
    <path d="M 220 110
             Q 234 120 226 138
             Q 220 144 216 138
             Q 222 124 218 116 Z"
          fill="url(#knot)" opacity="0.85"/>
    <path d="M 226 90
             Q 240 80 246 70
             Q 250 76 244 88
             Q 238 96 230 96 Z"
          fill="url(#knot)" opacity="0.85"/>

    <!-- Headband knot (left side, smaller) -->
    <path d="M 52 100
             L 30 90
             L 36 110
             L 22 114
             L 42 118
             L 38 106 Z"
          fill="url(#knot)" stroke="#3a0810" stroke-width="0.4"/>
    <path d="M 36 110
             Q 22 120 30 138
             Q 36 144 40 138
             Q 34 124 38 116 Z"
          fill="url(#knot)" opacity="0.85"/>

    <!-- Golden dragon claw / shuriken emblem on headband -->
    <g transform="translate(128, 102)" filter="url(#eyeBlur)">
      <!-- Outer ring -->
      <circle cx="0" cy="0" r="9" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#ffe680" stroke-width="0.6" opacity="0.7"/>
      <!-- 8-pointed shuriken -->
      <path d="M 0 -9
               L 1.8 -3 L 6 -6 L 3 -1.8 L 9 0
               L 3 1.8 L 6 6 L 1.8 3 L 0 9
               L -1.8 3 L -6 6 L -3 1.8 L -9 0
               L -3 -1.8 L -6 -6 L -1.8 -3 Z"
            fill="url(#gold)" stroke="#7a5a00" stroke-width="0.4"/>
      <!-- Center stud -->
      <circle cx="0" cy="0" r="1.8" fill="#fff5b8"/>
    </g>

    <!-- ===== EYES ===== -->
    <!-- Eye socket (dark slit) -->
    <path d="M 64 140
             Q 128 124 192 140
             L 192 168
             Q 128 152 64 168 Z"
          fill="url(#socket)"/>

    <!-- Socket top shadow -->
    <path d="M 64 140 Q 128 124 192 140 L 192 144 Q 128 128 64 144 Z"
          fill="#000000" opacity="0.7"/>

    <!-- Inner socket glow (subtle cyan bleed) -->
    <ellipse cx="128" cy="156" rx="60" ry="10" fill="#00ffe1" opacity="0.06"/>

    <!-- Left eye -->
    <g filter="url(#eyeBlur)">
      <ellipse cx="100" cy="152" rx="16" ry="6.5" fill="url(#eyeGlow)"/>
      <ellipse cx="100" cy="152" rx="9" ry="4" fill="#aaffee" opacity="0.9"/>
      <ellipse cx="100" cy="152" rx="3" ry="2.8" fill="#ffffff"/>
      <!-- Catchlight -->
      <circle cx="102" cy="150.5" r="0.8" fill="#ffffff"/>
    </g>

    <!-- Right eye -->
    <g filter="url(#eyeBlur)">
      <ellipse cx="156" cy="152" rx="16" ry="6.5" fill="url(#eyeGlow)"/>
      <ellipse cx="156" cy="152" rx="9" ry="4" fill="#aaffee" opacity="0.9"/>
      <ellipse cx="156" cy="152" rx="3" ry="2.8" fill="#ffffff"/>
      <circle cx="158" cy="150.5" r="0.8" fill="#ffffff"/>
    </g>

    <!-- Eye slit lower edge highlight -->
    <path d="M 64 168 Q 128 152 192 168" stroke="#00ffe1" stroke-width="0.6" fill="none" opacity="0.4"/>

    <!-- ===== LOWER FACE MASK (nose down) ===== -->
    <path d="M 68 172
             Q 128 188 188 172
             L 188 208
             Q 128 224 68 208 Z"
          fill="url(#cloth)"/>

    <!-- Cloth highlight on cheekbone -->
    <path d="M 72 176 Q 100 184 128 184 Q 156 184 184 176 L 184 184 Q 128 192 72 184 Z"
          fill="url(#clothHi)" opacity="0.5"/>

    <!-- Mask fold lines (realistic fabric) -->
    <g stroke="#0a0d18" stroke-width="0.9" fill="none" opacity="0.7">
      <path d="M 76 184 Q 128 196 180 184"/>
      <path d="M 80 196 Q 128 208 176 196"/>
      <path d="M 84 208 Q 128 218 172 208"/>
    </g>
    <!-- Subtle vertical seam -->
    <line x1="128" y1="172" x2="128" y2="216" stroke="#0a0d18" stroke-width="0.5" opacity="0.45"/>

    <!-- Small breathing slits (mask detail) -->
    <g fill="#000000" opacity="0.55">
      <rect x="120" y="208" width="16" height="1.2" rx="0.6"/>
      <rect x="118" y="212" width="20" height="1.2" rx="0.6"/>
      <rect x="120" y="216" width="16" height="1.2" rx="0.6"/>
    </g>

    <!-- Subtle neck shadow under mask -->
    <ellipse cx="128" cy="226" rx="50" ry="6" fill="#000000" opacity="0.4"/>
  </g>

  <!-- Foreground accent: thin neon arc behind head (energy aura) -->
  <path d="M 36 160 Q 128 60 220 160" fill="none" stroke="#00ffe1" stroke-width="0.8" opacity="0.25" stroke-dasharray="2 4"/>

  <!-- Bottom signature text -->
  <g opacity="0.8">
    <text x="128" y="246" font-family="'Courier New', monospace" font-size="9" fill="#00ffe1"
          text-anchor="middle" letter-spacing="3" font-weight="bold">NINJADBG</text>
  </g>

  <!-- Subtle scanline overlay (CRT effect) -->
  <g opacity="0.04">
    <rect x="0" y="0" width="256" height="1" fill="#00ffe1"/>
    <rect x="0" y="4" width="256" height="1" fill="#00ffe1"/>
    <rect x="0" y="8" width="256" height="1" fill="#00ffe1"/>
    <rect x="0" y="12" width="256" height="1" fill="#00ffe1"/>
  </g>
</svg>
