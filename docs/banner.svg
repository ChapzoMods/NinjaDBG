<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161f"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffe1"/>
      <stop offset="100%" stop-color="#00b8a0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="url(#bg)" stroke="#00ffe1" stroke-width="2" opacity="0.95"/>
  <!-- Ninja mask icon (simplified) -->
  <g transform="translate(40, 50)">
    <ellipse cx="50" cy="50" rx="40" ry="44" fill="#1b1e2c" stroke="#33384f" stroke-width="2"/>
    <rect x="10" y="38" width="80" height="14" fill="#c41e3a" rx="2"/>
    <rect x="22" y="60" width="56" height="22" fill="#1b1e2c" stroke="#33384f" stroke-width="1"/>
    <ellipse cx="35" cy="45" rx="8" ry="3" fill="#00ffe1" opacity="0.9"/>
    <ellipse cx="65" cy="45" rx="8" ry="3" fill="#00ffe1" opacity="0.9"/>
  </g>
  <text x="160" y="80" font-family="monospace" font-size="36" font-weight="bold" fill="#e6e8f0">NinjaDBG</text>
  <text x="162" y="110" font-family="sans-serif" font-size="16" fill="#00ffe1">Stealth-Aware Native Debugger</text>
  <text x="162" y="135" font-family="sans-serif" font-size="13" fill="#8a8fa3">v1.1.4 · Apache-2.0 · by Chapzoo</text>
