  <text x="560" y="140" font-family="monospace" font-size="14" fill="#8a8fa3">Lua + Python scripting</text>
  <text x="560" y="160" font-family="monospace" font-size="14" fill="#8a8fa3">Cross-platform (Win/Mac)</text>
